<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#08131f"/>
      <stop offset="1" stop-color="#03070d"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <style>
      @keyframes scanmove { 0%,100% { transform: translateY(0) } 50% { transform: translateY(300px) } }
      @keyframes rise { 0% { transform: translateY(0); opacity:0 } 15% { opacity:1 } 100% { transform: translateY(-150px); opacity:0 } }
      @keyframes grid { 0%,100% { opacity:.25 } 50% { opacity:.5 } }
      .scanbar { animation: scanmove 4s ease-in-out infinite; }
      .grid { animation: grid 4s ease-in-out infinite; }
      .l { transform-box: fill-box; transform-origin: center; }
      .l1{animation:rise 3s linear infinite}.l2{animation:rise 3.6s linear infinite .5s}
      .l3{animation:rise 3.2s linear infinite 1s}.l4{animation:rise 4s linear infinite 1.5s}
      .l5{animation:rise 3.4s linear infinite .8s}.l6{animation:rise 3.8s linear infinite 2s}
      .l7{animation:rise 3.1s linear infinite 2.4s}
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg2)"/>
  <!-- faint grid -->
  <g class="grid" stroke="#0e2a3a" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/><line x1="0" y1="320" x2="1280" y2="320"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- human figure (flat) -->
  <g transform="translate(360 130)" stroke="#0a1a26" stroke-width="6" stroke-linejoin="round">
    <circle cx="0" cy="60" r="48" fill="#1f6f8b"/>
    <path d="M-70 360 Q-70 150 0 150 Q70 150 70 360 Z" fill="#1f6f8b"/>
    <rect x="-96" y="170" width="36" height="150" rx="18" fill="#1f6f8b"/>
    <rect x="60" y="170" width="36" height="150" rx="18" fill="#1f6f8b"/>
  </g>

  <!-- rising letters from the body -->
  <g font-weight="800" fill="#7dd3fc">
    <text class="l l1" x="300" y="300" font-size="26">A</text>
    <text class="l l2" x="350" y="260" font-size="30">プ</text>
    <text class="l l3" x="410" y="300" font-size="24">{</text>
    <text class="l l4" x="380" y="220" font-size="22">я</text>
    <text class="l l5" x="320" y="240" font-size="28">e</text>
    <text class="l l6" x="430" y="260" font-size="26">字</text>
    <text class="l l7" x="360" y="320" font-size="22">∑</text>
  </g>

  <!-- moving scan bar -->
  <g class="scanbar">
    <rect x="250" y="150" width="240" height="26" fill="url(#scan)"/>
    <rect x="250" y="161" width="240" height="3" fill="#bff7ff"/>
  </g>

  <!-- text -->
  <text x="620" y="300" font-size="56" font-weight="800" fill="#eef6ff">build-your-users-<tspan fill="#22d3ee">mind</tspan></text>
  <text x="622" y="344" font-size="24" font-weight="500" fill="#9fd3e6">what you mind is what you get</text>
  <text x="622" y="384" font-size="16" fill="#5f93a8">the human, translated into language — your prompts become a model of you</text>
</svg>
