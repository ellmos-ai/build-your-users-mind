<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d14" />
      <stop offset="50%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161224" />
    </linearGradient>

    <!-- Dot Grid Pattern -->
    <pattern id="dotGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#ffffff" fill-opacity="0.05" />
    </pattern>

    <!-- Brand Gradients -->
    <linearGradient id="cyanVioletGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <linearGradient id="feedforwardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <linearGradient id="feedbackGrad" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Node Gradients -->
    <radialGradient id="agentBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#241b3d" />
      <stop offset="100%" stop-color="#0d1117" />
    </radialGradient>

    <radialGradient id="userBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0c2d38" />
      <stop offset="100%" stop-color="#0d1117" />
    </radialGradient>

    <linearGradient id="agentStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <linearGradient id="userStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <!-- Filters for Glow Effects -->
    <filter id="glow-subtle" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glow-bright" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 2 L 8 5 L 0 8 z" fill="#06b6d4" />
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 2 L 8 5 L 0 8 z" fill="#a855f7" />
    </marker>
  </defs>

  <style>
    .title {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 52px;
      font-weight: 800;
      fill: #f0f6fc;
      letter-spacing: -1.5px;
    }
    .tagline {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 22px;
      font-weight: 500;
      fill: #c9d1d9;
      letter-spacing: -0.2px;
    }
    .subtitle {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      font-weight: 400;
      fill: #8b949e;
      letter-spacing: 0.2px;
    }
    .tech-label {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
    }
  </style>

  <!-- 1. Background -->
  <rect width="1280" height="400" fill="url(#bgGradient)" />
  <rect width="1280" height="400" fill="url(#dotGrid)" />

  <!-- 2. Decorative Outer Border -->
  <rect x="20" y="20" width="1240" height="360" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.04" rx="12" />
  
  <!-- Corner Tech Accent Lines -->
  <path d="M 25 35 L 25 25 L 35 25" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.3" />
  <path d="M 1255 35 L 1255 25 L 1245 25" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3" />
  <path d="M 25 365 L 25 375 L 35 375" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.3" />
  <path d="M 1255 365 L 1255 375 L 1245 375" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3" />

  <!-- 3. Typography -->
  <g>
    <!-- Title -->
    <text x="100" y="170" class="title">
      build-your-users-<tspan fill="url(#cyanVioletGrad)">mind</tspan>
    </text>
    
    <!-- Tagline -->
    <text x="100" y="220" class="tagline">
      what you mind is what you get
    </text>
    
    <!-- Subtitle -->
    <text x="100" y="280" class="subtitle">
      an agent's theory-of-mind of its user — feedback precognition
    </text>
  </g>

  <!-- 4. Geometric Motif (Theory of Mind / Feedforward & Feedback) -->
  <g>
    <!-- Outer background radar circles (Faint tech details) -->
    <circle cx="980" cy="200" r="130" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="4 8" opacity="0.08" />
    <circle cx="980" cy="200" r="160" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="2 12" opacity="0.12" />
    
    <!-- Center coordinate crosshair -->
    <path d="M 980 185 L 980 215 M 965 200 L 995 200" fill="none" stroke="#8b949e" stroke-width="1" opacity="0.15" />
    
    <!-- Central projection/perception line connecting the centers directly -->
    <line x1="880" y1="200" x2="1080" y2="200" stroke="url(#cyanVioletGrad)" stroke-width="1" stroke-dasharray="3 6" opacity="0.3" />

    <!-- FEEDFORWARD Loop (Top Curve: Agent -> User) -->
    <path d="M 915 165 C 950 110, 1010 110, 1045 165" fill="none" stroke="url(#feedforwardGrad)" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-subtle)" />
    <!-- Glowing signal packet on feedforward loop -->
    <circle cx="980" cy="123.75" r="3.5" fill="#ffffff" filter="url(#glow-bright)" />

    <!-- FEEDBACK Loop (Bottom Curve: User -> Agent) -->
    <path d="M 1045 235 C 1010 290, 950 290, 915 235" fill="none" stroke="url(#feedbackGrad)" stroke-width="2.5" marker-end="url(#arrow-violet)" filter="url(#glow-subtle)" />
    <!-- Glowing signal packet on feedback loop -->
    <circle cx="980" cy="276.25" r="3.5" fill="#ffffff" filter="url(#glow-bright)" />

    <!-- NODE 1: AGENT (Left) -->
    <g>
      <!-- Glow underlay -->
      <circle cx="880" cy="200" r="50" fill="none" stroke="#7c3aed" stroke-width="8" opacity="0.15" filter="url(#glow-bright)" />
      <!-- Main circle -->
      <circle cx="880" cy="200" r="50" fill="url(#agentBg)" stroke="url(#agentStroke)" stroke-width="2" />
      <!-- Agent Inner Simulated User (ToM) -->
      <circle cx="880" cy="200" r="22" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.7" />
      <circle cx="880" cy="200" r="7" fill="url(#cyanVioletGrad)" opacity="0.5" />
      <!-- Small tech accent dot -->
      <circle cx="837" cy="225" r="4" fill="#c084fc" filter="url(#glow-bright)" />
      <!-- Small tech line -->
      <line x1="800" y1="200" x2="820" y2="200" stroke="#7c3aed" stroke-width="1" opacity="0.4" />
      <!-- Label -->
      <text x="880" y="275" class="tech-label" fill="#a855f7" text-anchor="middle">AGENT</text>
    </g>

    <!-- NODE 2: USER (Right) -->
    <g>
      <!-- Glow underlay -->
      <circle cx="1080" cy="200" r="50" fill="none" stroke="#06b6d4" stroke-width="8" opacity="0.15" filter="url(#glow-bright)" />
      <!-- Main circle -->
      <circle cx="1080" cy="200" r="50" fill="url(#userBg)" stroke="url(#userStroke)" stroke-width="2" />
      <!-- User Inner Core -->
      <circle cx="1080" cy="200" r="22" fill="none" stroke="url(#cyanVioletGrad)" stroke-width="1.5" opacity="0.7" />
      <circle cx="1080" cy="200" r="8" fill="#06b6d4" filter="url(#glow-bright)" />
      <!-- Small tech accent dot -->
      <circle cx="1123" cy="175" r="4" fill="#22d3ee" filter="url(#glow-bright)" />
      <!-- Small tech line -->
      <line x1="1140" y1="200" x2="1160" y2="200" stroke="#0891b2" stroke-width="1" opacity="0.4" />
      <!-- Label -->
      <text x="1080" y="275" class="tech-label" fill="#06b6d4" text-anchor="middle">USER</text>
    </g>
  </g>
</svg>
