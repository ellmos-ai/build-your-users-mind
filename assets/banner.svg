<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1c10"/>
      <stop offset="1" stop-color="#120c08"/>
    </linearGradient>
    <style>
      @keyframes fall  { 0% { transform: translateY(-120px); opacity:0 } 25% { opacity:1 } 70% { transform: translateY(0); opacity:1 } 85% { opacity:0 } 100% { opacity:0 } }
      @keyframes spin  { to { transform: rotate(360deg) } }
      @keyframes shake { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-3px) } }
      @keyframes march { from { transform: translateX(0) } to { transform: translateX(160px) } }
      @keyframes tread { to { stroke-dashoffset: -40 } }
      @keyframes bob   { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-4px) } }
      .gear  { transform-box: fill-box; transform-origin: center; animation: spin 6s linear infinite; }
      .mach  { animation: shake .5s ease-in-out infinite; }
      .march { animation: march 2.2s linear infinite; }
      .tread { animation: tread 1.2s linear infinite; }
      .bob   { transform-box: fill-box; transform-origin: center; animation: bob 1.2s ease-in-out infinite; }
      .f1{animation:fall 2.4s ease-in infinite}.f2{animation:fall 2.4s ease-in infinite .6s}
      .f3{animation:fall 2.4s ease-in infinite 1.2s}.f4{animation:fall 2.4s ease-in infinite 1.8s}
    </style>
    <g id="mb">
      <line x1="-9" y1="13" x2="-11" y2="30" stroke="#ec4899" stroke-width="6" stroke-linecap="round"/>
      <line x1="9" y1="13" x2="11" y2="30" stroke="#ec4899" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="-13" cy="32" rx="8" ry="4" fill="#be185d"/>
      <ellipse cx="13" cy="32" rx="8" ry="4" fill="#be185d"/>
      <path d="M-26 0 Q-31 -22 -8 -23 Q0 -33 10 -25 Q31 -26 26 0 Q28 15 8 17 L-8 17 Q-28 15 -26 0 Z" fill="#f9a8d4" stroke="#be185d" stroke-width="4"/>
      <g fill="none" stroke="#ec4899" stroke-width="3" stroke-linecap="round">
        <path d="M-15 -13 q8 4 0 11"/><path d="M1 -16 q8 4 0 11"/><path d="M15 -9 q6 3 0 9"/>
      </g>
      <circle cx="-6" cy="1" r="2.6" fill="#4a0e2e"/><circle cx="8" cy="1" r="2.6" fill="#4a0e2e"/>
      <path d="M-5 7 q6 5 13 0" fill="none" stroke="#4a0e2e" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </defs>

  <rect width="1280" height="640" fill="url(#bg3)"/>

  <!-- title block (top, clear of everything) -->
  <text x="100" y="92" font-size="56" font-weight="800" fill="#fff7ec">build-your-users-<tspan fill="#fbbf24">mind</tspan></text>
  <text x="102" y="130" font-size="23" font-weight="500" fill="#e8c98c">what you mind is what you get</text>
  <text x="102" y="160" font-size="15" fill="#a9824a">letters in — happy little minds out, hand in hand</text>

  <!-- belt supports + ground -->
  <rect x="0" y="566" width="1280" height="74" fill="#0c0805"/>
  <line x1="0" y1="566" x2="1280" y2="566" stroke="#3a2a14" stroke-width="4"/>
  <g fill="#1c130a"><rect x="470" y="532" width="20" height="40"/><rect x="1010" y="532" width="20" height="40"/></g>

  <!-- conveyor belt -->
  <g>
    <rect x="330" y="500" width="990" height="34" rx="8" fill="#3a2a14" stroke="#0c0805" stroke-width="5"/>
    <line class="tread" x1="342" y1="517" x2="1316" y2="517" stroke="#7a5a2a" stroke-width="6" stroke-dasharray="14 26"/>
    <circle cx="352" cy="517" r="15" fill="#9a7430" stroke="#0c0805" stroke-width="5"/>
    <circle cx="1298" cy="517" r="15" fill="#9a7430" stroke="#0c0805" stroke-width="5"/>
  </g>

  <!-- hand-holding mini-brains, emerging from the machine, rolling out of frame -->
  <g transform="translate(0 470)"><g class="march">
    <g stroke="#ec4899" stroke-width="6" fill="none" stroke-linecap="round">
      <path d="M244 2 Q300 22 356 2"/><path d="M404 2 Q460 22 516 2"/><path d="M564 2 Q620 22 676 2"/>
      <path d="M724 2 Q780 22 836 2"/><path d="M884 2 Q940 22 996 2"/><path d="M1044 2 Q1100 22 1156 2"/>
    </g>
    <g fill="#f9a8d4" stroke="#be185d" stroke-width="2">
      <circle cx="300" cy="20" r="5"/><circle cx="460" cy="20" r="5"/><circle cx="620" cy="20" r="5"/>
      <circle cx="780" cy="20" r="5"/><circle cx="940" cy="20" r="5"/><circle cx="1100" cy="20" r="5"/>
    </g>
    <g class="bob"><use href="#mb" x="220" y="0"/></g>
    <g class="bob"><use href="#mb" x="380" y="0"/></g>
    <g class="bob"><use href="#mb" x="540" y="0"/></g>
    <g class="bob"><use href="#mb" x="700" y="0"/></g>
    <g class="bob"><use href="#mb" x="860" y="0"/></g>
    <g class="bob"><use href="#mb" x="1020" y="0"/></g>
    <g class="bob"><use href="#mb" x="1180" y="0"/></g>
  </g></g>

  <!-- machine + funnel (drawn on top: brains appear to exit it) -->
  <g stroke="#0c0805" stroke-width="6" stroke-linejoin="round">
    <path d="M150 248 L300 248 L262 320 L188 320 Z" fill="#38bdf8"/>
    <g class="mach">
      <rect x="140" y="320" width="240" height="192" rx="16" fill="#f59e0b"/>
      <rect x="352" y="468" width="42" height="46" fill="#1c130a" stroke="#0c0805" stroke-width="5"/>
      <g class="gear">
        <circle cx="222" cy="408" r="38" fill="#fcd34d" stroke="#0c0805" stroke-width="5"/>
        <g fill="#0c0805"><rect x="218" y="362" width="8" height="15"/><rect x="218" y="439" width="8" height="15"/>
          <rect x="176" y="404" width="15" height="8"/><rect x="253" y="404" width="15" height="8"/></g>
        <circle cx="222" cy="408" r="9" fill="#0c0805"/>
      </g>
      <circle cx="322" cy="368" r="18" fill="#fcd34d" stroke="#0c0805" stroke-width="4"/>
    </g>
  </g>

  <!-- letters falling into the funnel -->
  <g font-weight="800" fill="#7dd3fc" text-anchor="middle">
    <text class="f1" x="225" y="244" font-size="30">A</text><text class="f2" x="255" y="244" font-size="26">字</text>
    <text class="f3" x="205" y="244" font-size="24">я</text><text class="f4" x="240" y="244" font-size="22">∑</text>
  </g>
</svg>
