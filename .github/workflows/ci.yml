name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install ruff==0.15.18
      - run: python -m compileall -q scripts tests
      - run: python -m unittest discover -s tests -v
      - run: ruff check .
      - run: python -c "import json; json.load(open('ellmos-module.v2.json', encoding='utf-8')); json.load(open('schemas/classification.schema.json', encoding='utf-8'))"
